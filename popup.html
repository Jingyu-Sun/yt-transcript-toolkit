<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .header svg {
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    #videoTitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 14px;
      line-height: 1.4;
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    #copyBtn {
      width: 100%;
      padding: 10px 16px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #copyBtn:hover {
      background: #a30000;
    }

    #copyBtn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #deepseekBtn {
      width: 100%;
      margin-top: 8px;
      padding: 10px 16px;
      background: #4d6bfe;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #deepseekBtn:hover {
      background: #3a54d4;
    }

    #deepseekBtn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 16px;
    }

    #status.error {
      color: #cc0000;
    }

    #status.success {
      color: #1a8f1a;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#cc0000">
      <path d="M23.5 6.2c-.3-1-1-1.8-2-2.1C19.6 3.5 12 3.5 12 3.5s-7.6 0-9.5.6c-1 .3-1.7 1.1-2 2.1C0 8.1 0 12 0 12s0 3.9.5 5.8c.3 1 1 1.8 2 2.1 1.9.6 9.5.6 9.5.6s7.6 0 9.5-.6c1-.3 1.7-1.1 2-2.1.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.5 15.6V8.4l6.3 3.6-6.3 3.6z"/>
    </svg>
    <h1>YT Transcript Copier</h1>
  </div>

  <div id="videoTitle">Loading…</div>

  <button id="copyBtn">Copy Title + Transcript</button>

  <button id="deepseekBtn">Send to DeepSeek</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
